name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Syntax check
        run: python -m py_compile bot.py ai.py db.py i18n.py filters.py formatting.py ratelimit.py admin.py health.py

      - name: Shell syntax check
        run: bash -n install.sh deploy.sh scripts/backup.sh scripts/update.sh

      - name: Run pytest
        env:
          TELEGRAM_TOKEN: test:fake
          GEMINI_API_KEY: test-fake
          LOG_SALT: ci-test-salt
        run: python -m pytest -q --tb=short
